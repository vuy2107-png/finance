<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh mục | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/category.css}">
</head>

<body>

    <div class="app-container">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar('categories')}"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 style="font-size: 1.875rem; font-weight: 700;">Quản lý Danh mục</h1>
                        <p style="color: var(--text-muted);">Cá nhân hóa các loại thu nhập và chi tiêu của bạn.</p>
                    </div>
                    <button onclick="openAddModal()" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Thêm danh mục
                    </button>
                </div>

                <div th:if="${message}" class="alert alert-success" style="margin-bottom: 1.5rem;">
                    <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 1.5rem;">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                </div>

                <div class="category-grid">
                    <div th:each="cat : ${categories}" class="category-card">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div class="category-icon"
                                th:style="'background: ' + ${cat.colorCode ?: '#3b82f6'} + '20; color: ' + ${cat.colorCode ?: '#3b82f6'}">
                                <i th:class="${cat.icon ?: 'fas fa-tag'}"></i>
                            </div>
                            <span
                                th:class="'category-badge ' + ${cat.type.name() == 'INCOME' ? 'badge-income' : 'badge-expense'}"
                                th:text="${cat.type.name() == 'INCOME' ? 'Thu nhập' : 'Chi tiêu'}"></span>
                        </div>

                        <h3 th:text="${cat.name}" style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem;">
                        </h3>
                        <p th:text="${cat.description}"
                            style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; min-height: 2.5rem;">
                        </p>

                        <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
                            <button class="btn btn-secondary btn-edit"
                                style="padding: 0.375rem 0.75rem; font-size: 0.75rem;" th:data-id="${cat.id}"
                                th:data-name="${cat.name}" th:data-type="${cat.type}" th:data-icon="${cat.icon}"
                                th:data-color="${cat.colorCode}" th:data-desc="${cat.description}">
                                <i class="fas fa-edit"></i> Sửa
                            </button>
                            <form th:if="${cat.name != 'Khác'}"
                                th:action="@{/user/categories/delete/{id}(id=${cat.id})}" method="post"
                                onsubmit="return confirm('Bạn có chắc chắn muốn xóa danh mục này? Các giao dịch liên quan sẽ được chuyển sang mục \'Khác\'.')">
                                <button type="submit" class="btn btn-secondary"
                                    style="padding: 0.375rem 0.75rem; font-size: 0.75rem; color: var(--danger);">
                                    <i class="fas fa-trash"></i> Xóa
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Category Modal -->
    <div id="categoryModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">Thêm danh mục mới</h2>
                <button type="button" class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form th:action="@{/user/categories/save}" method="post" th:object="${newCategory}">
                <input type="hidden" th:field="*{id}" id="categoryId">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="catName">Tên danh mục</label>
                        <input type="text" th:field="*{name}" id="catName" class="form-control"
                            placeholder="VD: Shopping, Freelance..." required>
                    </div>
                    <div class="form-group">
                        <label for="catType">Loại</label>
                        <select th:field="*{type}" id="catType" class="form-control" required>
                            <option th:each="t : ${types}" th:if="${t.name() != 'TRANSFER'}" th:value="${t}"
                                th:text="${t.name() == 'INCOME' ? 'Thu nhập' : 'Chi tiêu'}"></option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Chọn Icon</label>
                            <input type="hidden" th:field="*{icon}" id="catIcon" value="fas fa-tag">
                            <div class="icon-picker-grid" id="iconPicker">
                                <!-- Icons will be populated by category.js -->
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="catColor">Màu sắc</label>
                            <input type="color" th:field="*{colorCode}" id="catColor" class="form-control"
                                style="height: 45px; padding: 2px;" value="#3b82f6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="catDesc">Mô tả (không bắt buộc)</label>
                        <textarea th:field="*{description}" id="catDesc" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Lưu danh mục</button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/js/category.js}"></script>
</body>

</html>
