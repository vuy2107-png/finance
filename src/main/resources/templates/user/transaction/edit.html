<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Giao dịch | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/user/dashboard" class="navbar-brand">
                <i class="fas fa-chart-pie"></i> Finance Pro
            </a>
            <div class="navbar-nav">
                <a th:href="@{/user/dashboard}" class="nav-link">Tổng quan</a>
                <a th:href="@{/user/transactions}" class="nav-link active">Giao dịch</a>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-secondary" style="padding: 0.375rem 0.75rem; font-size: 0.75rem;">Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="max-width: 800px;">
        <div style="margin-bottom: 2rem;">
            <a th:href="@{/user/transactions}" style="color: var(--text-muted); font-size: 0.875rem; font-weight: 500; display: inline-flex; align-items: center; gap: 0.25rem;">
                <i class="fas fa-arrow-left"></i> Quay lại danh sách
            </a>
        </div>

        <div class="card">
            <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 1.25rem; margin-bottom: 1.5rem;">
                <div>
                    <h1 class="card-title" style="font-size: 1.5rem;">Cập nhật giao dịch</h1>
                    <p style="margin-top: 0.25rem; font-size: 0.875rem;">Chỉnh sửa thông tin và lưu lại các thay đổi.</p>
                </div>
            </div>

            <form th:action="@{/user/transactions/edit}" method="post" th:object="${transaction}">
                <input type="hidden" th:field="*{id}"/>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                    <div class="form-group">
                        <label for="type">Loại giao dịch</label>
                        <select th:field="*{type}" id="type" class="form-control" required>
                            <option value="INCOME">Thu nhập</option>
                            <option value="EXPENSE">Chi tiêu</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="amount">Số tiền (VNĐ)</label>
                        <input type="number" step="0.01" th:field="*{amount}" id="amount" class="form-control" required>
                        <div style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="date">Ngày thực hiện</label>
                    <input type="date" th:field="*{date}" id="date" class="form-control" required>
                    <div style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
                </div>

                <div class="form-group">
                    <label for="description">Mô tả chi tiết</label>
                    <textarea th:field="*{description}" id="description" class="form-control"></textarea>
                    <div style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color);">
                    <a th:href="@{/user/transactions}" class="btn btn-secondary">Hủy bỏ</a>
                    <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
