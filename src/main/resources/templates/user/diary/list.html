<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật ký chi tiêu | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; margin: 0; }
        .app-container { display: flex; min-height: 100vh; }
        .diary-card {
            background: white; border-radius: 16px; padding: 1.25rem;
            display: flex; align-items: center; gap: 1.25rem;
            border: 1px solid #e2e8f0; margin-bottom: 1rem; cursor: pointer;
            transition: all 0.2s;
        }
        .diary-card:hover { border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .date-circle {
            width: 50px; height: 50px; background: #f1f5f9; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 700; border: 1px solid #e2e8f0;
        }
        .status-badge { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .status-SUCCESS { background: #dcfce7; color: #15803d; }
        .status-WARNING { background: #fef3c7; color: #d97706; }
        .status-DANGER { background: #fee2e2; color: #b91c1c; }
        .status-NONE { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/sidebar :: sidebar('diary')}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/top-header :: top-header('Nhật ký chi tiêu', 'Theo dõi kỷ luật tài chính tháng ' + ${currentMonth}, ~{::headerActions})}">
                <div th:fragment="headerActions">
                    <form th:action="@{/user/diary}" method="get" style="margin: 0;">
                        <select name="month" onchange="this.form.submit()" style="padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; outline: none; background: white;">
                            <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="'Tháng ' + ${m}" th:selected="${m == currentMonth}"></option>
                        </select>
                    </form>
                </div>
            </div>

            <div class="container" style="padding-top: 2rem;">

            <!-- Thống kê nhanh -->
            <div style="background: #6366f1; color: white; padding: 1.5rem; border-radius: 20px; margin-bottom: 2rem; display: flex; gap: 3rem;">
                <div>
                    <div style="font-size: 1.5rem; font-weight: 800;" th:text="${successDays}">0</div>
                    <div style="font-size: 0.75rem; opacity: 0.8; font-weight: 700;">NGÀY KỶ LUẬT TỐT</div>
                </div>
                <div>
                    <div style="font-size: 1.5rem; font-weight: 800;" th:text="${#lists.size(dailyReport)}">0</div>
                    <div style="font-size: 0.75rem; opacity: 0.8; font-weight: 700;">TỔNG NGÀY GHI CHÉP</div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(dailyReport)}" style="text-align: center; padding: 5rem 0; color: #94a3b8;">
                <p>Chưa có dữ liệu cho tháng này.</p>
            </div>

            <!-- Danh sách nhật ký -->
            <div th:each="day : ${dailyReport}" 
                 class="diary-card" 
                 th:data-date="${day['date']}"
                 th:data-formatted-date="${#temporals.format(day['date'], 'dd/MM/yyyy')}"
                 th:data-spent="${day['spent']}"
                 th:data-limit="${day['limit']}"
                 th:data-percent="${day['percent']}"
                 th:data-status="${day['status']}"
                 th:data-status-text="${day['status'] == 'SUCCESS' ? 'Kỷ luật tốt' : (day['status'] == 'WARNING' ? 'Cảnh báo' : 'Vượt hạn mức')}"
                 onclick="openDiaryDetail(this)">
                
                <div class="date-circle">
                    <span th:text="${#temporals.format(day['date'], 'dd')}">01</span>
                    <span style="font-size: 0.6rem; color: #64748b;" th:text="'T.' + ${#temporals.format(day['date'], 'MM')}">05</span>
                </div>
                
                <div style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <div style="font-weight: 700; font-size: 1.1rem;">
                            <span th:text="${#numbers.formatDecimal(day['spent'], 0, 'COMMA', 0, 'POINT')}">0</span>
                            <span th:if="${day['limit'] > 0}" th:text="' / ' + ${#numbers.formatDecimal(day['limit'], 0, 'COMMA', 0, 'POINT')}" style="color: #94a3b8; font-size: 0.9rem; font-weight: 500;"></span>
                            <span style="font-size: 0.8rem; color: #94a3b8;"> đ</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <span th:if="${day['limit'] > 0}" style="font-size: 0.8rem; font-weight: 700; color: #1e293b;" th:text="${#numbers.formatDecimal(day['percent'], 0, 0)} + '%'"></span>
                            <span th:if="${day['status'] != 'NONE'}" th:class="'status-badge status-' + ${day['status']}" 
                                  th:text="${day['status'] == 'SUCCESS' ? 'Kỷ luật tốt' : (day['status'] == 'WARNING' ? 'Cảnh báo' : 'Vượt hạn mức')}"></span>
                        </div>
                    </div>
                    <div th:if="${day['limit'] > 0}" style="height: 6px; background: #f1f5f9; border-radius: 3px; overflow: hidden;">
                        <div th:style="'width: ' + ${day['percent'] > 100 ? 100 : day['percent']} + '%; height: 100%; background: ' + (${day['status'] == 'DANGER' ? '#ef4444' : (day['status'] == 'WARNING' ? '#f59e0b' : '#10b981')})"></div>
                    </div>
                </div>
                <i class="fas fa-chevron-right" style="color: #cbd5e1;"></i>
            </div>
        </main>
    </div>

    <!-- Diary Detail Modal -->
    <div id="diaryDetailModal" class="modal-overlay" style="z-index: 10005;">
        <div class="modal-content" style="max-width: 480px; border-radius: 20px; overflow: hidden;">
            <div class="modal-header" id="diaryModalHeader" style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border-bottom: none; padding: 1.25rem 1.5rem;">
                <h2 class="modal-title" style="color: white; display: flex; align-items: center; gap: 0.75rem; font-size: 1.2rem; margin: 0; font-weight: 700;">
                    <i class="fas fa-calendar-day"></i> Chi tiết ngày <span id="modalDateText">18/05/2026</span>
                </h2>
                <button type="button" class="modal-close" onclick="closeModal('diaryDetailModal')" style="color: white; opacity: 0.8; background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" style="background: white; padding: 1.5rem;">
                <!-- Tổng quan chi tiêu trong ngày -->
                <div style="background: #f8fafc; border-radius: 14px; padding: 1.25rem; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                        <span style="font-weight: 700; color: #475569; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Tổng chi tiêu / Hạn mức</span>
                        <span id="modalStatusBadge" class="status-badge" style="padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700;"></span>
                    </div>
                    <div style="display: flex; align-items: baseline; gap: 0.25rem; margin-bottom: 0.75rem;">
                        <span id="modalSpentText" style="font-size: 1.6rem; font-weight: 800; color: #1e293b;">5,000,000</span>
                        <span id="modalLimitText" style="color: #94a3b8; font-size: 1rem; font-weight: 600;">/ 1,060,000</span>
                        <span style="font-size: 0.9rem; color: #94a3b8; font-weight: 600;"> đ</span>
                    </div>
                    <!-- Thanh tiến trình -->
                    <div style="height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem;">
                        <div id="modalProgressBar" style="width: 0%; height: 100%; transition: width 0.3s ease;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #64748b; font-weight: 700;">
                        <span>Tỷ lệ sử dụng hạn mức</span>
                        <span id="modalPercentText">0%</span>
                    </div>
                </div>

                <!-- Danh sách giao dịch -->
                <h3 style="font-size: 0.95rem; font-weight: 800; color: #1e293b; margin: 0 0 1rem 0; display: flex; align-items: center; gap: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">
                    <i class="fas fa-list-ul" style="color: #6366f1;"></i> Danh sách giao dịch phát sinh
                </h3>
                <div id="modalTransactionsList" style="max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding-right: 2px;">
                    <!-- Giao dịch chèn động bằng JS -->
                </div>
            </div>
            <div class="modal-footer" style="background: #f8fafc; padding: 1rem 1.5rem; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('diaryDetailModal')" style="min-width: 90px; height: 40px; border-radius: 10px; font-weight: 600;">Đóng</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        function openDiaryDetail(element) {
            const date = element.getAttribute('data-date');
            const formattedDate = element.getAttribute('data-formatted-date');
            const spent = parseFloat(element.getAttribute('data-spent'));
            const limit = parseFloat(element.getAttribute('data-limit'));
            const percent = parseFloat(element.getAttribute('data-percent'));
            const status = element.getAttribute('data-status');
            const statusText = element.getAttribute('data-status-text');

            // Cập nhật thông tin chi tiết
            document.getElementById('modalDateText').innerText = formattedDate;
            document.getElementById('modalSpentText').innerText = formatNumber(spent);
            
            if (limit > 0) {
                document.getElementById('modalLimitText').innerText = ' / ' + formatNumber(limit);
                document.getElementById('modalPercentText').innerText = Math.round(percent) + '%';
                
                // Cập nhật thanh tiến trình
                const bar = document.getElementById('modalProgressBar');
                bar.style.width = (percent > 100 ? 100 : percent) + '%';
                
                // Cập nhật status badge
                const badge = document.getElementById('modalStatusBadge');
                badge.className = 'status-badge status-' + status;
                badge.innerText = statusText;
                badge.style.display = 'inline-block';
                
                if (status === 'DANGER') {
                    bar.style.backgroundColor = '#ef4444';
                    document.getElementById('diaryModalHeader').style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
                } else if (status === 'WARNING') {
                    bar.style.backgroundColor = '#f59e0b';
                    document.getElementById('diaryModalHeader').style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
                } else {
                    bar.style.backgroundColor = '#10b981';
                    document.getElementById('diaryModalHeader').style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                }
            } else {
                document.getElementById('modalLimitText').innerText = '';
                document.getElementById('modalPercentText').innerText = '0%';
                document.getElementById('modalProgressBar').style.width = '0%';
                document.getElementById('modalStatusBadge').style.display = 'none';
                document.getElementById('diaryModalHeader').style.background = 'linear-gradient(135deg, #6366f1 0%, #4f46e5 100%)';
            }

            // Hiển thị trạng thái loading trước
            const listContainer = document.getElementById('modalTransactionsList');
            listContainer.innerHTML = `
                <div style="text-align: center; padding: 2.5rem 0; color: #94a3b8;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.8rem; margin-bottom: 0.5rem; color: #6366f1;"></i>
                    <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Đang tải danh sách giao dịch...</p>
                </div>
            `;

            // Mở modal
            openModal('diaryDetailModal');

            // Gọi AJAX lấy giao dịch
            fetch('/user/diary/api/transactions?date=' + date)
                .then(res => res.json())
                .then(data => {
                    listContainer.innerHTML = '';
                    if (!data || data.length === 0) {
                        listContainer.innerHTML = `
                            <div style="text-align: center; padding: 2.5rem 0; color: #94a3b8;">
                                <i class="fas fa-info-circle" style="font-size: 1.8rem; margin-bottom: 0.5rem; color: #cbd5e1;"></i>
                                <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Không có bất kỳ giao dịch nào trong ngày này.</p>
                            </div>
                        `;
                        return;
                    }

                    data.forEach(t => {
                        const isIncome = t.type === 'INCOME';
                        const isTransfer = t.type === 'TRANSFER';
                        const amountColor = isIncome ? '#10b981' : (isTransfer ? '#f59e0b' : '#ef4444');
                        const amountPrefix = isIncome ? '+' : (isTransfer ? '⇅ ' : '-');
                        
                        let walletInfo = '';
                        if (isTransfer) {
                            walletInfo = `<span style="font-size: 0.75rem; color: #64748b; font-weight: 500;"><i class="fas fa-exchange-alt" style="margin: 0 4px; color: #94a3b8;"></i> ${t.toWalletName}</span>`;
                        } else {
                            walletInfo = `<span style="font-size: 0.75rem; color: #64748b; font-weight: 500;"><i class="fas fa-wallet" style="margin-right: 4px; color: #94a3b8;"></i> ${t.walletName}</span>`;
                        }

                        const card = document.createElement('div');
                        card.style.display = 'flex';
                        card.style.alignItems = 'center';
                        card.style.justifyContent = 'space-between';
                        card.style.padding = '0.75rem 1rem';
                        card.style.background = '#f8fafc';
                        card.style.borderRadius = '12px';
                        card.style.border = '1px solid #e2e8f0';
                        card.style.boxShadow = '0 1px 2px rgba(0,0,0,0.02)';

                        card.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;">
                                <div style="width: 36px; height: 36px; border-radius: 10px; background: ${t.categoryColor}15; color: ${t.categoryColor}; display: flex; align-items: center; justify-content: center; font-size: 0.95rem;">
                                    <i class="${t.categoryIcon}"></i>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.2rem;">
                                    <span style="font-size: 0.85rem; font-weight: 700; color: #1e293b;">${t.description || t.categoryName}</span>
                                    <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                                        <span style="font-size: 0.7rem; background: ${t.categoryColor}15; color: ${t.categoryColor}; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 700; text-transform: uppercase;">${t.categoryName}</span>
                                        ${walletInfo}
                                    </div>
                                </div>
                            </div>
                            <span style="font-size: 0.9rem; font-weight: 700; color: ${amountColor}; white-space: nowrap; margin-left: 0.75rem;">
                                ${amountPrefix}${formatNumber(t.amount)} đ
                            </span>
                        `;
                        listContainer.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error("Error loading transactions:", err);
                    listContainer.innerHTML = `
                        <div style="text-align: center; padding: 2.5rem 0; color: #ef4444;">
                            <i class="fas fa-exclamation-circle" style="font-size: 1.8rem; margin-bottom: 0.5rem;"></i>
                            <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Có lỗi xảy ra khi tải danh sách giao dịch.</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
