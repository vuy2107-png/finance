<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhật ký chi tiêu | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; margin: 0; }
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .status-badge { padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700; }
        .status-SUCCESS { background: #dcfce7; color: #15803d; }
        .status-WARNING { background: #fef3c7; color: #d97706; }
        .status-DANGER { background: #fee2e2; color: #b91c1c; }
        .status-NONE { background: #f1f5f9; color: #64748b; }

        /* Giao diện Lịch chi tiêu một màn hình */
        .diary-layout-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem 1.5rem;
            min-height: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        .stats-banner {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 0.6rem 1.25rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.15);
            flex-shrink: 0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-size: 1.15rem;
            font-weight: 800;
        }
        .stat-divider {
            width: 1px;
            height: 14px;
            background: rgba(255,255,255,0.3);
        }

        .calendar-container {
            background: white;
            border-radius: 16px;
            padding: 1.25rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 1rem;
        }
        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            flex-shrink: 0;
        }
        .calendar-days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 1fr;
            gap: 8px;
            flex: 1;
            min-height: 0;
            margin-top: 0.5rem;
        }
        .calendar-header-cell {
            text-align: center;
            font-weight: 700;
            color: #64748b;
            padding: 0.5rem 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .calendar-cell {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            height: 100%;
            box-sizing: border-box;
        }
        .calendar-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
        }
        .calendar-cell.padding {
            background: #f8fafc;
            border-color: #f1f5f9;
            cursor: default;
            pointer-events: none;
            opacity: 0.4;
        }
        .calendar-cell.cell-none {
            background: white;
            border-color: #e2e8f0;
            color: #475569;
        }
        .calendar-cell.cell-success {
            background: #e8f5e9;
            border-color: #a5d6a7;
            color: #2e7d32;
        }
        .calendar-cell.cell-danger {
            background: #ffebee;
            border-color: #ef9a9a;
            color: #c62828;
        }
        .calendar-cell.cell-today {
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        .calendar-cell.cell-today::after {
            content: 'Hôm nay';
            position: absolute;
            top: 2px;
            right: 4px;
            background: #3b82f6;
            color: white;
            font-size: 0.5rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 3px;
            text-transform: uppercase;
        }
        .calendar-cell .day-number {
            font-weight: 800;
            font-size: 1.05rem;
            line-height: 1.2;
        }
        .calendar-cell .day-spent {
            font-size: 0.75rem;
            font-weight: 700;
            text-align: right;
            margin-top: auto;
        }
        .month-navigation {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f1f5f9;
            padding: 0.25rem;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
        }
        .btn-nav-month {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            color: #4f46e5;
            background: white;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-nav-month:hover {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/sidebar :: sidebar('diary')}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/top-header :: top-header('Nhật ký chi tiêu', 'Theo dõi kỷ luật tài chính tháng ' + ${currentMonth}, ~{::headerActions})}">
                <div th:fragment="headerActions" th:with="
                    prevMonth=${currentMonth == 1 ? 12 : currentMonth - 1},
                    prevYear=${currentMonth == 1 ? currentYear - 1 : currentYear},
                    nextMonth=${currentMonth == 12 ? 1 : currentMonth + 1},
                    nextYear=${currentMonth == 12 ? currentYear + 1 : currentYear}
                ">
                    <div class="month-navigation">
                        <a th:href="@{/user/diary(month=${prevMonth}, year=${prevYear})}" class="btn-nav-month" title="Tháng trước">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                        <form th:action="@{/user/diary}" method="get" style="margin: 0; display: flex; align-items: center; gap: 0.25rem;">
                            <input type="hidden" name="year" th:value="${currentYear}">
                            <select name="month" onchange="this.form.submit()" style="padding: 0.35rem 0.75rem; border-radius: 6px; border: none; font-weight: 700; outline: none; background: transparent; cursor: pointer; color: #1e293b; font-size: 0.9rem;">
                                <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}" th:text="'Tháng ' + ${m} + '/' + ${currentYear}" th:selected="${m == currentMonth}"></option>
                            </select>
                        </form>
                        <a th:href="@{/user/diary(month=${nextMonth}, year=${nextYear})}" class="btn-nav-month" title="Tháng sau">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="diary-layout-container">

            <!-- Thống kê nhanh gọn gàng -->
            <div class="stats-banner">
                <div class="stat-item">
                    <span class="stat-label">Ngày kỷ luật tốt:</span>
                    <span class="stat-value" th:text="${successDays}">0</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Tổng ngày ghi chép:</span>
                    <span class="stat-value" th:text="${totalSpentDays}">0</span>
                </div>
            </div>

            <!-- Giao diện Lịch chi tiêu -->
            <div class="calendar-container">
                <!-- Hàng tiêu đề thứ tự các ngày trong tuần -->
                <div class="calendar-weekdays">
                    <div class="calendar-header-cell">T2</div>
                    <div class="calendar-header-cell">T3</div>
                    <div class="calendar-header-cell">T4</div>
                    <div class="calendar-header-cell">T5</div>
                    <div class="calendar-header-cell">T6</div>
                    <div class="calendar-header-cell">T7</div>
                    <div class="calendar-header-cell">CN</div>
                </div>
                
                <!-- Lưới các ô ngày -->
                <div class="calendar-days-grid">
                    <!-- Lặp qua các ô trong calendarCells -->
                    <th:block th:each="cell : ${calendarCells}">
                        <!-- Ô đệm (isPadding == true) -->
                        <div th:if="${cell.isPadding}" class="calendar-cell padding">
                            <span class="day-number"></span>
                        </div>
                        
                        <!-- Ô ngày thực tế (isPadding == false) -->
                        <div th:if="${!cell.isPadding}"
                             th:with="
                                isToday=${cell.date == today},
                                isSpentZero=${cell.spent == 0},
                                isDanger=${cell.status == 'DANGER'},
                                cellClass=${isSpentZero ? 'cell-none' : (isDanger ? 'cell-danger' : 'cell-success')}
                             "
                             th:class="'calendar-cell ' + ${cellClass} + (${isToday} ? ' cell-today' : '')"
                             th:data-date="${cell.date}"
                             th:data-formatted-date="${#temporals.format(cell.date, 'dd/MM/yyyy')}"
                             th:data-spent="${cell.spent}"
                             th:data-limit="${cell.limit}"
                             th:data-percent="${cell.percent}"
                             th:data-status="${cell.status}"
                             th:data-status-text="${cell.status == 'SUCCESS' ? 'Kỷ luật tốt' : (cell.status == 'DANGER' ? 'Vượt hạn mức' : '')}"
                             onclick="openDiaryDetail(this)">
                             
                            <div class="day-number" th:text="${#temporals.format(cell.date, 'd')}">1</div>
                            
                            <div class="day-spent" th:if="${cell.spent > 0}">
                                <span th:text="${#numbers.formatDecimal(cell.spent / 1000.0, 0, 'COMMA', 0, 'POINT') + 'K'}">50K</span>
                            </div>
                        </div>
                    </th:block>
                </div>
            </div>
        </main>
    </div>

    <!-- Diary Detail Modal -->
    <div id="diaryDetailModal" class="modal-overlay" style="z-index: 10005;">
        <div class="modal-content" style="max-width: 480px; border-radius: 20px; overflow: hidden;">
            <div class="modal-header" id="diaryModalHeader" style="background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); color: white; border-bottom: none; padding: 1.25rem 1.5rem;">
                <h2 class="modal-title" style="color: white; display: flex; align-items: center; gap: 0.75rem; font-size: 1.2rem; margin: 0; font-weight: 700;">
                    <i class="fas fa-calendar-day"></i> Chi tiết ngày <span id="modalDateText">18/05/2026</span>
                </h2>
                <button type="button" class="modal-close" onclick="closeModal('diaryDetailModal')" style="color: white; opacity: 0.8; background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" style="background: white; padding: 1.5rem;">
                <!-- Tổng quan chi tiêu trong ngày -->
                <div style="background: #f8fafc; border-radius: 14px; padding: 1.25rem; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; box-shadow: var(--shadow-sm);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                        <span style="font-weight: 700; color: #475569; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;">Tổng chi tiêu / Hạn mức</span>
                        <span id="modalStatusBadge" class="status-badge" style="padding: 0.25rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 700;"></span>
                    </div>
                    <div style="display: flex; align-items: baseline; gap: 0.25rem; margin-bottom: 0.75rem;">
                        <span id="modalSpentText" style="font-size: 1.6rem; font-weight: 800; color: #1e293b;">5,000,000</span>
                        <span id="modalLimitText" style="color: #94a3b8; font-size: 1rem; font-weight: 600;">/ 1,060,000</span>
                        <span style="font-size: 0.9rem; color: #94a3b8; font-weight: 600;"> đ</span>
                    </div>
                    <!-- Thanh tiến trình -->
                    <div style="height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 0.5rem;">
                        <div id="modalProgressBar" style="width: 0%; height: 100%; transition: width 0.3s ease;"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; color: #64748b; font-weight: 700;">
                        <span>Tỷ lệ sử dụng hạn mức</span>
                        <span id="modalPercentText">0%</span>
                    </div>
                </div>

                <!-- Danh sách giao dịch -->
                <h3 style="font-size: 0.95rem; font-weight: 800; color: #1e293b; margin: 0 0 1rem 0; display: flex; align-items: center; gap: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px;">
                    <i class="fas fa-list-ul" style="color: #6366f1;"></i> Danh sách giao dịch phát sinh
                </h3>
                <div id="modalTransactionsList" style="max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem; padding-right: 2px;">
                    <!-- Giao dịch chèn động bằng JS -->
                </div>
            </div>
            <div class="modal-footer" style="background: #f8fafc; padding: 1rem 1.5rem; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end;">
                <button type="button" class="btn btn-secondary" onclick="closeModal('diaryDetailModal')" style="min-width: 90px; height: 40px; border-radius: 10px; font-weight: 600;">Đóng</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function formatNumber(num) {
            return new Intl.NumberFormat('en-US').format(num);
        }

        function openDiaryDetail(element) {
            const date = element.getAttribute('data-date');
            const formattedDate = element.getAttribute('data-formatted-date');
            const spent = parseFloat(element.getAttribute('data-spent'));
            const limit = parseFloat(element.getAttribute('data-limit'));
            const percent = parseFloat(element.getAttribute('data-percent'));
            const status = element.getAttribute('data-status');
            const statusText = element.getAttribute('data-status-text');

            // Cập nhật thông tin chi tiết
            document.getElementById('modalDateText').innerText = formattedDate;
            document.getElementById('modalSpentText').innerText = formatNumber(spent);
            
            const bar = document.getElementById('modalProgressBar');
            const badge = document.getElementById('modalStatusBadge');
            const limitText = document.getElementById('modalLimitText');
            const percentText = document.getElementById('modalPercentText');
            const header = document.getElementById('diaryModalHeader');

            if (status === 'DANGER') {
                limitText.innerText = ' / ' + formatNumber(limit);
                percentText.innerText = limit > 0 ? Math.round(percent) + '%' : '100%';
                bar.style.width = '100%';
                bar.style.backgroundColor = '#ef4444';
                badge.className = 'status-badge status-DANGER';
                badge.innerText = 'Vượt hạn mức';
                badge.style.display = 'inline-block';
                header.style.background = 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)';
            } else if (status === 'SUCCESS') {
                limitText.innerText = ' / ' + formatNumber(limit);
                percentText.innerText = Math.round(percent) + '%';
                bar.style.width = (percent > 100 ? 100 : percent) + '%';
                bar.style.backgroundColor = '#10b981';
                badge.className = 'status-badge status-SUCCESS';
                badge.innerText = 'Kỷ luật tốt';
                badge.style.display = 'inline-block';
                header.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
            } else if (status === 'WARNING') {
                limitText.innerText = ' / ' + formatNumber(limit);
                percentText.innerText = Math.round(percent) + '%';
                bar.style.width = (percent > 100 ? 100 : percent) + '%';
                bar.style.backgroundColor = '#f59e0b';
                badge.className = 'status-badge status-WARNING';
                badge.innerText = 'Cảnh báo';
                badge.style.display = 'inline-block';
                header.style.background = 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)';
            } else {
                // status === 'NONE'
                limitText.innerText = limit > 0 ? ' / ' + formatNumber(limit) : '';
                percentText.innerText = '0%';
                bar.style.width = '0%';
                badge.style.display = 'none';
                header.style.background = 'linear-gradient(135deg, #6366f1 0%, #4f46e5 100%)';
            }

            // Hiển thị trạng thái loading trước
            const listContainer = document.getElementById('modalTransactionsList');
            listContainer.innerHTML = `
                <div style="text-align: center; padding: 2.5rem 0; color: #94a3b8;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.8rem; margin-bottom: 0.5rem; color: #6366f1;"></i>
                    <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Đang tải danh sách giao dịch...</p>
                </div>
            `;

            // Mở modal
            openModal('diaryDetailModal');

            // Gọi AJAX lấy giao dịch
            fetch('/user/diary/api/transactions?date=' + date)
                .then(res => res.json())
                .then(data => {
                    listContainer.innerHTML = '';
                    if (!data || data.length === 0) {
                        listContainer.innerHTML = `
                            <div style="text-align: center; padding: 2.5rem 0; color: #94a3b8;">
                                <i class="fas fa-info-circle" style="font-size: 1.8rem; margin-bottom: 0.5rem; color: #cbd5e1;"></i>
                                <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Không có bất kỳ giao dịch nào trong ngày này.</p>
                            </div>
                        `;
                        return;
                    }

                    data.forEach(t => {
                        const isIncome = t.type === 'INCOME';
                        const isTransfer = t.type === 'TRANSFER';
                        const amountColor = isIncome ? '#10b981' : (isTransfer ? '#f59e0b' : '#ef4444');
                        const amountPrefix = isIncome ? '+' : (isTransfer ? '⇅ ' : '-');
                        
                        let walletInfo = '';
                        if (isTransfer) {
                            walletInfo = `<span style="font-size: 0.75rem; color: #64748b; font-weight: 500;"><i class="fas fa-exchange-alt" style="margin: 0 4px; color: #94a3b8;"></i> ${t.toWalletName}</span>`;
                        } else {
                            walletInfo = `<span style="font-size: 0.75rem; color: #64748b; font-weight: 500;"><i class="fas fa-wallet" style="margin-right: 4px; color: #94a3b8;"></i> ${t.walletName}</span>`;
                        }

                        const card = document.createElement('div');
                        card.style.display = 'flex';
                        card.style.alignItems = 'center';
                        card.style.justifyContent = 'space-between';
                        card.style.padding = '0.75rem 1rem';
                        card.style.background = '#f8fafc';
                        card.style.borderRadius = '12px';
                        card.style.border = '1px solid #e2e8f0';
                        card.style.boxShadow = '0 1px 2px rgba(0,0,0,0.02)';

                        card.innerHTML = `
                            <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;">
                                <div style="width: 36px; height: 36px; border-radius: 10px; background: ${t.categoryColor}15; color: ${t.categoryColor}; display: flex; align-items: center; justify-content: center; font-size: 0.95rem;">
                                    <i class="${t.categoryIcon}"></i>
                                </div>
                                <div style="display: flex; flex-direction: column; gap: 0.2rem;">
                                    <span style="font-size: 0.85rem; font-weight: 700; color: #1e293b;">${t.description || t.categoryName}</span>
                                    <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                                        <span style="font-size: 0.7rem; background: ${t.categoryColor}15; color: ${t.categoryColor}; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 700; text-transform: uppercase;">${t.categoryName}</span>
                                        ${walletInfo}
                                    </div>
                                </div>
                            </div>
                            <span style="font-size: 0.9rem; font-weight: 700; color: ${amountColor}; white-space: nowrap; margin-left: 0.75rem;">
                                ${amountPrefix}${formatNumber(t.amount)} đ
                            </span>
                        `;
                        listContainer.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error("Error loading transactions:", err);
                    listContainer.innerHTML = `
                        <div style="text-align: center; padding: 2.5rem 0; color: #ef4444;">
                            <i class="fas fa-exclamation-circle" style="font-size: 1.8rem; margin-bottom: 0.5rem;"></i>
                            <p style="margin: 0; font-size: 0.85rem; font-weight: 500;">Có lỗi xảy ra khi tải danh sách giao dịch.</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
