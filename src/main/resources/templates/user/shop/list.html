<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa hàng Icon | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .shop-header {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            padding: 3rem 2rem;
            border-radius: 24px;
            color: white;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.3);
        }

        .balance-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: right;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .icon-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .icon-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #6366f1;
        }

        .icon-preview-box {
            width: 100%;
            height: 120px;
            background: #f8fafc;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #6366f1;
            overflow: hidden;
        }

        .icon-preview-box img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .icon-name {
            font-weight: 700;
            font-size: 1.125rem;
            color: #1e293b;
            margin: 0;
        }

        .icon-price {
            font-weight: 800;
            color: #6366f1;
            font-size: 1.25rem;
        }

        .btn-buy {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            padding: 0.75rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .icon-card:hover .btn-buy {
            background: #6366f1;
            color: white;
        }

        .empty-shop {
            text-align: center;
            padding: 5rem;
            background: white;
            border-radius: 24px;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div th:replace="~{fragments/sidebar :: sidebar('shop')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/top-header :: top-header('Cửa hàng Icon', 'Làm mới giao diện tài chính với những biểu tượng độc đáo', ~{::headerActions})}">
                <div th:fragment="headerActions" class="header-actions">
                    <div style="display: flex; align-items: center; gap: 1rem; background: #6366f1; padding: 0.5rem 1.25rem; border-radius: 16px; color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);">
                        <div style="text-align: right;">
                            <div style="font-size: 0.65rem; opacity: 0.8; font-weight: 700; text-transform: uppercase;">Số dư của bạn</div>
                            <div style="font-size: 1.1rem; font-weight: 800;" th:text="${#numbers.formatDecimal(user.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>
                        </div>
                        <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2);"></div>
                        <a href="/user/deposit" style="color: white; font-size: 1.1rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">
                            <i class="fas fa-plus-circle"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="container" style="padding-top: 2rem;">

            <div th:if="${message}" class="alert alert-success" style="margin-bottom: 2rem;">
                <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 2rem;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div th:if="${#lists.isEmpty(icons)}" class="empty-shop">
                <i class="fas fa-store-slash" style="font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.3;"></i>
                <h2>Cửa hàng hiện đang trống</h2>
                <p>Admin đang cập nhật những bộ icon mới. Vui lòng quay lại sau!</p>
            </div>

            <div class="icon-grid" th:unless="${#lists.isEmpty(icons)}">
                <div class="icon-card" th:each="icon : ${icons}">
                    <div class="icon-preview-box">
                        <!-- Hiển thị ảnh nếu là URL -->
                        <img th:if="${icon.url.startsWith('http') || icon.url.startsWith('/')}" th:src="${icon.url}">
                        <!-- Hiển thị font nếu là mã Class -->
                        <i th:unless="${icon.url.startsWith('http') || icon.url.startsWith('/')}"
                            th:class="${icon.url}"></i>
                    </div>
                    <h3 class="icon-name" th:text="${icon.name}">Tên Icon</h3>
                    <div class="icon-price"
                        th:text="${#numbers.formatDecimal(icon.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</div>

                    <form th:action="@{/user/shop/buy/{id}(id=${icon.id})}" method="post">
                        <button type="submit" class="btn-buy" style="width: 100%;">
                            <i class="fas fa-shopping-cart"></i> Mua ngay
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
