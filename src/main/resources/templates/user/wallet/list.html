<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví của tôi | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar('wallets')}"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div th:replace="~{fragments/top-header :: top-header('Ví của tôi', 'Quản lý các tài khoản ngân hàng và ví tiền mặt của bạn', ~{::headerActions})}">
                <div th:fragment="headerActions" class="header-actions">
                    <button class="btn btn-secondary" onclick="openBudgetModal()" style="display: flex; align-items: center; gap: 0.5rem; background: white; border: 1px solid #e2e8f0; color: #64748b;">
                        <i class="fas fa-cog"></i> Hạn mức
                    </button>
                    <button class="btn btn-primary" onclick="openModal('addWalletModal')">
                        <i class="fas fa-plus"></i> Thêm ví mới
                    </button>
                </div>
            </div>

            <div class="container">

                <div th:if="${message}" class="alert alert-success" style="margin-bottom: 1.5rem;">
                    <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
                </div>

                <!-- Search Bar -->
                <div class="card" style="margin-bottom: 1.5rem; padding: 1rem;">
                    <form th:action="@{/user/wallets}" method="get">
                        <div style="display: flex; gap: 0.75rem;">
                            <div style="flex: 1; position: relative;">
                                <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm kiếm tên ví..." 
                                       style="padding-left: 2.75rem; height: 42px; border-radius: var(--radius-lg);">
                            </div>
                            <button type="submit" class="btn btn-primary" style="height: 42px; padding: 0 1.5rem; border-radius: var(--radius-lg);">Tìm kiếm</button>
                            <a th:href="@{/user/wallets}" class="btn btn-secondary" style="height: 42px; width: 42px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-lg);">
                                <i class="fas fa-redo"></i>
                            </a>
                        </div>
                    </form>
                </div>

                <div class="metric-grid">
                    <div th:each="wallet : ${wallets}" class="card" style="padding: 1.5rem; position: relative; overflow: hidden;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                            <div style="width: 3rem; height: 3rem; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"
                                 th:style="'background: ' + ${wallet.colorCode ?: '#e2e8f0'} + '20; color: ' + ${wallet.colorCode ?: '#64748b'}">
                                <i th:class="${wallet.icon ?: 'fas fa-wallet'}"></i>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <a th:href="@{/user/wallets/{id}(id=${wallet.id})}" class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">
                                    <i class="fas fa-list-ul"></i> Sao kê
                                </a>
                                <form th:action="@{/user/wallets/delete/{id}(id=${wallet.id})}" method="post" 
                                      onsubmit="return confirm('Bạn có chắc chắn muốn xóa ví này? Tất cả giao dịch liên quan sẽ bị ảnh hưởng.')">
                                    <button type="submit" class="btn btn-danger" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">Xóa</button>
                                </form>
                            </div>
                        </div>
                        <h3 style="margin-bottom: 0.25rem;">
                            <a th:href="@{/user/wallets/{id}(id=${wallet.id})}" th:text="${wallet.name}" style="color: inherit; text-decoration: none;">Ví chính</a>
                        </h3>
                        <div class="metric-value" th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">15,000,000 đ</div>
                    </div>
                </div>

                <!-- Pagination -->
                <div th:if="${page.totalPages > 1}" class="pagination" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem;">
                    <a th:if="${page.hasPrevious()}" th:href="@{/user/wallets(page=${page.number - 1}, keyword=${keyword})}" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                    <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                        <a th:href="@{/user/wallets(page=${i}, keyword=${keyword})}" 
                           class="btn" th:classappend="${i == page.number ? 'btn-primary' : 'btn-secondary'}"
                           th:text="${i + 1}" style="min-width: 40px; text-align: center;"></a>
                    </th:block>
                    <a th:if="${page.hasNext()}" th:href="@{/user/wallets(page=${page.number + 1}, keyword=${keyword})}" class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments/wallet-modal :: wallet-modal}"></div>
    <div th:replace="~{fragments/budget-modal :: budget-modal}"></div>

    <script th:src="@{/js/wallet.js}"></script>
    <script th:src="@{/js/wallet-detail.js}"></script>
</body>
</html>
