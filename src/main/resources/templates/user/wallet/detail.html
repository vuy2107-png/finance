<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Chi tiết ví: ' + ${wallet.name} + ' | Finance Pro'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <div th:replace="~{fragments/sidebar :: sidebar('wallets')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/top-header :: top-header(${wallet.name}, 'Chi tiết các giao dịch thu, chi và chuyển tiền của ví này', ~{::headerActions})}">
                <div th:fragment="headerActions" class="header-actions">
                    <a th:href="@{/user/wallets}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                    <button class="btn btn-secondary" 
                            th:data-id="${wallet.id}"
                            th:data-name="${wallet.name}"
                            th:data-limit="${effectiveLimit ?: 0}"
                            onclick="openBudgetModal(this.getAttribute('data-id'), this.getAttribute('data-name'), this.getAttribute('data-limit'))">
                        <i class="fas fa-cog"></i> Hạn mức
                    </button>
                    <button class="btn btn-secondary" style="background: #ecfdf5; color: #10b981; border-color: #d1fae5;" onclick="openFundingModal()">
                        <i class="fas fa-hand-holding-usd"></i> Cấp vốn
                    </button>
                    <button class="btn btn-primary" th:onclick="'showQuickModalFromWallet(' + ${wallet.id} + ')'">
                        <i class="fas fa-plus"></i> Giao dịch mới
                    </button>
                </div>
            </div>

            <div class="container">

                <!-- Wallet Stats Card -->
                <div class="card" style="margin-bottom: 2rem; padding: 2rem; background: var(--bg-card); border-left: 5px solid" th:styleappend="'border-left-color: ' + ${wallet.colorCode ?: '#3b82f6'}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;">Số dư hiện tại</span>
                            <h2 style="font-size: 2.5rem; font-weight: 700; margin-top: 0.5rem;" 
                                th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</h2>
                        </div>
                        <div style="width: 64px; height: 64px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;"
                             th:styleappend="'background: ' + ${wallet.colorCode ?: '#3b82f6'} + '20; color: ' + ${wallet.colorCode ?: '#3b82f6'}">
                            <i class="fas fa-wallet"></i>
                        </div>
                    </div>
                </div>


                <!-- Search & Filter Bar for Statement -->
                <div class="card" style="margin-bottom: 1.5rem; padding: 1rem;">
                    <form th:action="@{/user/wallets/{id}(id=${wallet.id})}" method="get">
                        <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
                            <div style="flex: 2; min-width: 200px; position: relative;">
                                <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                                <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm kiếm giao dịch trong ví này..." 
                                       style="padding-left: 2.75rem; height: 42px; border-radius: var(--radius-lg);">
                            </div>
                            <div style="flex: 1; min-width: 150px;">
                                <input type="date" name="startDate" th:value="${startDate}" class="form-control" style="height: 42px; border-radius: var(--radius-lg);">
                            </div>
                            <div style="flex: 1; min-width: 150px;">
                                <input type="date" name="endDate" th:value="${endDate}" class="form-control" style="height: 42px; border-radius: var(--radius-lg);">
                            </div>
                            <button type="submit" class="btn btn-primary" style="height: 42px; padding: 0 1.5rem; border-radius: var(--radius-lg);">Lọc</button>
                            <a th:href="@{/user/wallets/{id}(id=${wallet.id})}" class="btn btn-secondary" style="height: 42px; width: 42px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-lg);">
                                <i class="fas fa-redo"></i>
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Transaction History -->
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 class="card-title">Sao kê chi tiết</h3>
                    </div>
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>NGÀY</th>
                                    <th>DANH MỤC</th>
                                    <th>MÔ TẢ</th>
                                    <th style="text-align: right;">SỐ TIỀN</th>
                                    <th style="text-align: center;">HÀNH ĐỘNG</th>
                                </tr>
                            </thead>
                            <tbody>
                                <th:block th:each="entry : ${groupedTransactions}">
                                    <tr style="background: #f8fafc; border-bottom: 1px solid var(--border-color);">
                                        <td colspan="5" style="padding: 0.75rem 1rem; font-weight: 700; color: var(--primary-color);">
                                            <i class="far fa-calendar-alt"></i> 
                                            <span th:text="${#temporals.format(entry.key, 'dd/MM/yyyy')}"></span>
                                        </td>
                                    </tr>
                                    <tr th:each="t : ${entry.value}">
                                        <td></td>
                                        <td>
                                            <span class="badge" th:classappend="${t.type.name() == 'INCOME' ? 'badge-income' : (t.type.name() == 'TRANSFER' ? 'badge-blue' : 'badge-expense')}"
                                                  th:text="${t.category != null ? t.category.name : (t.type.name() == 'TRANSFER' ? 'Chuyển tiền' : 'Khác')}"></span>
                                        </td>
                                        <td>
                                            <div th:if="${t.type.name() == 'TRANSFER'}">
                                                <span th:if="${t.wallet.id == wallet.id and t.toWallet != null}" th:text="'Đến ví: ' + ${t.toWallet.name}"></span>
                                                <span th:if="${t.toWallet != null and t.toWallet.id == wallet.id}" th:text="'Từ ví: ' + ${t.wallet.name}"></span>
                                            </div>
                                            <div th:if="${t.type.name() != 'TRANSFER'}" th:text="${t.description}"></div>
                                        </td>
                                        <td style="text-align: right; font-weight: 600;">
                                            <span th:if="${t.type.name() == 'INCOME'}" class="text-success" th:text="'+' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                            <span th:if="${t.type.name() == 'EXPENSE'}" class="text-danger" th:text="'-' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                            <span th:if="${t.type.name() == 'TRANSFER' && t.wallet.id == wallet.id}" class="text-danger" th:text="'-' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                            <span th:if="${t.type.name() == 'TRANSFER' && t.toWallet != null && t.toWallet.id == wallet.id}" class="text-success" th:text="'+' + ${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                        </td>
                                        <td style="text-align: center;">
                                            <div style="display: flex; gap: 0.5rem; justify-content: center; align-items: center;">
                                                <span th:if="${t.description != null and t.description.contains('Nạp tiền vào quỹ')}" 
                                                      class="badge" style="background: #e0e7ff; color: #4338ca; padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600;">Tiết kiệm</span>
                                                <span th:if="${t.description != null and t.description.contains('Khởi tạo')}" 
                                                      class="badge" style="background: #d1fae5; color: #059669; padding: 0.25rem 0.75rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600;">Vốn quản lý</span>
                                                <span th:if="${t.description != null and !t.description.contains('Nạp tiền vào quỹ') and !t.description.contains('Khởi tạo')}"
                                                      th:class="${'badge ' + (t.type.name() == 'INCOME' ? 'badge-income' : (t.type.name() == 'EXPENSE' ? 'badge-expense' : 'badge-blue'))}"
                                                      th:text="${t.type.name() == 'INCOME' ? 'Dòng tiền vào' : (t.type.name() == 'EXPENSE' ? 'Chi tiêu' : 'Chuyển tiền')}"></span>
                                                
                                                <button type="button" class="btn btn-secondary" style="padding: 0.25rem 0.5rem;"
                                                        th:attr="data-date=${#temporals.format(t.date, 'dd/MM/yyyy')},
                                                                 data-type=${t.type.name()},
                                                                 data-cat=${t.category != null ? t.category.name : 'Khác'},
                                                                 data-amount=${#numbers.formatDecimal(t.amount, 0, 'COMMA', 0, 'POINT')},
                                                                 data-desc=${t.description},
                                                                 data-wallet=${t.wallet != null ? t.wallet.name : ''},
                                                                 data-towallet=${t.toWallet != null ? t.toWallet.name : ''}"
                                                        onclick="showTransactionDetail(this)">
                                                    <i class="fas fa-eye"></i>
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                </th:block>
                                <tr th:if="${page.totalElements == 0}">
                                    <td colspan="5" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                        Chưa có giao dịch nào phù hợp với bộ lọc.
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- Pagination -->
                        <div th:if="${page.totalPages > 1}" class="pagination" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; padding: 1rem 0;">
                            <a th:if="${page.hasPrevious()}" 
                               th:href="@{/user/wallets/{id}(id=${wallet.id}, page=${page.number - 1}, startDate=${startDate}, endDate=${endDate}, keyword=${keyword})}" 
                               class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                                <i class="fas fa-chevron-left"></i>
                            </a>
                            <th:block th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}">
                                <a th:href="@{/user/wallets/{id}(id=${wallet.id}, page=${i}, startDate=${startDate}, endDate=${endDate}, keyword=${keyword})}" 
                                   class="btn" th:classappend="${i == page.number ? 'btn-primary' : 'btn-secondary'}"
                                   th:text="${i + 1}" style="min-width: 40px; text-align: center;"></a>
                            </th:block>
                            <a th:if="${page.hasNext()}" 
                               th:href="@{/user/wallets/{id}(id=${wallet.id}, page=${page.number + 1}, startDate=${startDate}, endDate=${endDate}, keyword=${keyword})}" 
                               class="btn btn-secondary" style="padding: 0.5rem 1rem;">
                                <i class="fas fa-chevron-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <!-- Transaction Detail Modal -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2 class="modal-title">Chi tiết giao dịch</h2>
                <button type="button" class="modal-close" onclick="closeDetailModal()">&times;</button>
            </div>
            <div class="modal-body" id="detailModalBody">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div id="detailTypeBadge" class="badge" style="font-size: 0.75rem; margin-bottom: 0.5rem;"></div>
                    <h3 id="detailAmount" style="font-size: 2rem; font-weight: 700; margin: 0;"></h3>
                    <p id="detailDate" style="font-size: 0.875rem; color: var(--text-muted); margin-top: 0.25rem;"></p>
                </div>
                
                <div style="display: grid; gap: 1.25rem;">
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">
                        <span style="color: var(--text-muted);">Danh mục:</span>
                        <span id="detailCategory" style="font-weight: 500;"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">
                        <span style="color: var(--text-muted);">Ví thực hiện:</span>
                        <span id="detailWallet" style="font-weight: 500;"></span>
                    </div>
                    <div id="detailToWalletRow" style="display: none; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 0.75rem;">
                        <span style="color: var(--text-muted);">Ví nhận:</span>
                        <span id="detailToWallet" style="font-weight: 500;"></span>
                    </div>
                    <div>
                        <span style="color: var(--text-muted); display: block; margin-bottom: 0.5rem;">Ghi chú:</span>
                        <div id="detailDescription" style="padding: 1rem; background: var(--bg-body); border-radius: var(--radius-md); font-size: 0.875rem; min-height: 60px;"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="closeDetailModal()">Đóng</button>
            </div>
        </div>
    </div>

    <!-- Funding Modal -->
    <div id="fundingModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h2 class="modal-title">Cấp vốn cho ví</h2>
                <button type="button" class="modal-close" onclick="closeFundingModal()">&times;</button>
            </div>
            <form th:action="@{/user/wallets/fund}" method="post">
                <input type="hidden" name="walletId" th:value="${wallet.id}">
                <div class="modal-body">
                    <div th:if="${message}" class="alert alert-success" style="margin-bottom: 1rem;" th:text="${message}"></div>
                    <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 1rem;" th:text="${error}"></div>

                    <div class="form-group">
                        <label>Số tiền cấp thêm (VNĐ)</label>
                        <input type="number" name="amount" class="form-control" placeholder="Nhập số tiền..." required>
                    </div>
                    <div class="form-group">
                        <label>Ghi chú cấp vốn</label>
                        <input type="text" name="description" class="form-control" value="Cấp vốn bổ sung">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeFundingModal()">Hủy</button>
                    <button type="submit" class="btn btn-primary">Xác nhận cấp vốn</button>
                </div>
            </form>
        </div>
    </div>

    <div th:replace="~{fragments/budget-modal :: budget-modal}"></div>
    <script th:src="@{/js/wallet-detail.js}"></script>
</body>
</html>
