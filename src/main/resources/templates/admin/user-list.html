<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Người dùng | Finance Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-primary: #3b82f6;
            --admin-dark: #0f172a;
            --admin-bg: #f1f5f9;
        }
        body { background-color: var(--admin-bg); color: var(--admin-dark); font-family: 'Inter', sans-serif; }
        .admin-sidebar { width: 260px; background: var(--admin-dark); height: 100vh; position: fixed; left: 0; top: 0; color: white; padding: 2rem 1.5rem; }
        .admin-main { margin-left: 260px; padding: 2rem; }
        .sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1rem; color: #94a3b8; text-decoration: none; border-radius: 12px; transition: all 0.3s; margin-bottom: 0.5rem; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(255,255,255,0.1); color: white; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .table { width: 100%; border-collapse: collapse; }
        .table th { background: #f8fafc; padding: 1rem 1.5rem; font-size: 0.75rem; color: #64748b; text-transform: uppercase; text-align: left; }
        .table td { padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
        .badge-premium { background: #fef3c7; color: #92400e; }
        .badge-free { background: #f1f5f9; color: #64748b; }
        .badge-active { background: #ecfdf5; color: #059669; }
        .badge-blocked { background: #fef2f2; color: #dc2626; }
        .alert { padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .alert-success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 3rem; display: flex; align-items: center; gap: 0.75rem;">
            <div style="width: 35px; height: 35px; background: var(--admin-primary); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-alt" style="font-size: 1.2rem;"></i>
            </div>
            <span>ADMIN PRO</span>
        </div>
        <nav>
            <a href="/admin/dashboard" class="sidebar-link">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="/admin/users" class="sidebar-link active">
                <i class="fas fa-users"></i> Quản lý User
            </a>
            <a href="/admin/icons" class="sidebar-link">
                <i class="fas fa-icons"></i> Cửa hàng Icon
            </a>
            <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a href="/user/dashboard" class="sidebar-link">
                    <i class="fas fa-user-circle"></i> Chế độ User
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="sidebar-link" style="background: none; border: none; width: 100%; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </nav>
    </aside>

    <main class="admin-main">
        <div style="margin-bottom: 2rem;">
            <h1 style="font-size: 1.75rem; font-weight: 800;">Quản lý Người dùng</h1>
            <p style="color: #64748b;">Danh sách tất cả tài khoản trên hệ thống.</p>
        </div>

        <div th:if="${message}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
        </div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Người dùng</th>
                        <th>Vai trò</th>
                        <th>Gói dịch vụ</th>
                        <th>Trạng thái</th>
                        <th>Ngày tham gia</th>
                        <th style="text-align: center;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <div style="width: 36px; height: 36px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700;">
                                    <span th:text="${#strings.substring(u.username, 0, 1).toUpperCase()}">U</span>
                                </div>
                                <div>
                                    <div style="font-weight: 600;" th:text="${u.username}">username</div>
                                    <div style="font-size: 0.75rem; color: #64748b;" th:text="${u.email}">email</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span style="font-size: 0.875rem; font-weight: 500;" th:text="${u.role}">ROLE</span>
                        </td>
                        <td>
                            <span th:if="${u.premium}" class="badge badge-premium"><i class="fas fa-crown"></i> Premium</span>
                            <span th:unless="${u.premium}" class="badge badge-free">Free Plan</span>
                        </td>
                        <td>
                            <span th:if="${u.active}" class="badge badge-active"><i class="fas fa-check"></i> Hoạt động</span>
                            <span th:unless="${u.active}" class="badge badge-blocked"><i class="fas fa-lock"></i> Đã khóa</span>
                        </td>
                        <td style="font-size: 0.875rem; color: #475569;" th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}"></td>
                        <td style="text-align: center;">
                            <div style="display: flex; gap: 0.5rem; justify-content: center;">
                                <!-- Toggle Premium -->
                                <form th:action="@{/admin/users/toggle-premium}" method="post">
                                    <input type="hidden" name="id" th:value="${u.id}">
                                    <button type="submit" class="btn btn-secondary" style="padding: 0.4rem 0.6rem; font-size: 0.75rem;" 
                                            th:title="${u.premium ? 'Hạ cấp xuống Free' : 'Nâng cấp Premium'}">
                                        <i th:class="${u.premium ? 'fas fa-arrow-down' : 'fas fa-crown'}"></i>
                                    </button>
                                </form>
                                <!-- Toggle Status -->
                                <form th:action="@{/admin/users/toggle-status}" method="post">
                                    <input type="hidden" name="id" th:value="${u.id}">
                                    <button type="submit" th:class="${u.active ? 'btn btn-danger' : 'btn btn-success'}" 
                                            style="padding: 0.4rem 0.6rem; font-size: 0.75rem;"
                                            th:title="${u.active ? 'Khóa tài khoản' : 'Mở khóa tài khoản'}">
                                        <i th:class="${u.active ? 'fas fa-user-slash' : 'fas fa-user-check'}"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>
