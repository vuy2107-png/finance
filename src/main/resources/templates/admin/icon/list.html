<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Icon | Admin Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body style="background-color: #f1f5f9;">

    <div class="app-container">
        <!-- Sidebar Admin -->
        <div th:replace="~{fragments/admin-sidebar :: admin-sidebar('icons')}"></div>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 class="page-title">Quản lý Cửa hàng Icon</h1>
                    <p class="page-subtitle">Thêm và quản lý các bộ biểu tượng cho người dùng mua sắm.</p>
                </div>
                <button class="btn btn-primary" onclick="document.getElementById('iconModal').style.display='flex'">
                    <i class="fas fa-plus"></i> Thêm Icon mới
                </button>
            </header>

            <div th:if="${message}" class="alert alert-success" th:text="${message}" style="margin-bottom: 1.5rem;"></div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Xem trước</th>
                                <th>Tên Icon</th>
                                <th>Giá bán</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="icon : ${icons}">
                                <td>
                                    <div style="width: 50px; height: 50px; background: #f8fafc; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; overflow: hidden; border: 1px solid #e2e8f0;">
                                        <!-- Nếu là Link ảnh -->
                                        <img th:if="${icon.url.startsWith('http') || icon.url.startsWith('/')}" 
                                             th:src="${icon.url}" style="width: 100%; height: 100%; object-fit: contain;">
                                        <!-- Nếu là FontAwesome -->
                                        <i th:unless="${icon.url.startsWith('http') || icon.url.startsWith('/')}" 
                                           th:class="${icon.url}"></i>
                                    </div>
                                </td>
                                <td th:text="${icon.name}" style="font-weight: 600;"></td>
                                <td th:text="${#numbers.formatDecimal(icon.price, 0, 'COMMA', 0, 'POINT')} + ' đ'" style="color: var(--primary); font-weight: 700;"></td>
                                <td>
                                    <span th:class="${icon.active ? 'badge badge-income' : 'badge badge-expense'}"
                                          th:text="${icon.active ? 'Đang bán' : 'Ngừng bán'}"></span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/icons/toggle/{id}(id=${icon.id})}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">
                                        <i th:class="${icon.active ? 'fas fa-eye-slash' : 'fas fa-eye'}"></i>
                                    </a>
                                    <a th:href="@{/admin/icons/delete/{id}(id=${icon.id})}" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.875rem; margin-left: 0.5rem;" onclick="return confirm('Xác nhận xóa icon này?')">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal thêm Icon -->
    <div id="iconModal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div class="card" style="width: 500px; margin: 0;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 style="margin: 0;">Thêm Icon mới</h3>
                <button onclick="document.getElementById('iconModal').style.display='none'" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form th:action="@{/admin/icons/save}" th:object="${newIcon}" method="post">
                <div class="form-group">
                    <label>Tên biểu tượng</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Ví hoàng gia" required>
                </div>
                <div class="form-group">
                    <label>Hình ảnh hoặc Mã biểu tượng</label>
                    <input type="text" th:field="*{url}" class="form-control" placeholder="Dán link ảnh (PNG/SVG) hoặc mã fas fa-..." required>
                    <small style="color: #64748b;">Dán link ảnh 3D để icon đẹp hơn, hoặc dùng mã FontAwesome.</small>
                </div>
                <div class="form-group">
                    <label>Giá bán (đ)</label>
                    <input type="number" th:field="*{price}" class="form-control" placeholder="Ví dụ: 10000" required>
                </div>
                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Mô tả ngắn về icon..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Lưu Icon</button>
            </form>
        </div>
    </div>

</body>
</html>
