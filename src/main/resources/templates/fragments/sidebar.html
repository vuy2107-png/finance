<div th:fragment="sidebar(activeLink)">
    <aside class="sidebar">
        <div class="sidebar-header">
            <a href="/user/dashboard" class="sidebar-brand">
                <i class="fas fa-chart-pie"></i>
                <span>Finance Pro</span>
            </a>
        </div>

        <nav class="sidebar-menu">
            <div class="sidebar-label">Trang chủ</div>
            <a th:href="@{/user/dashboard}" class="sidebar-link"
                th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                <i class="fas fa-th-large"></i>
                <span>Tổng quan</span>
            </a>
            <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" th:href="@{/admin/dashboard}" class="sidebar-link" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">
                <i class="fas fa-shield-alt"></i>
                <span>Về trang Admin</span>
            </a>
            <a th:href="@{/user/diary}" class="sidebar-link"
                th:classappend="${activeLink == 'diary' ? 'active' : ''}">
                <i class="fas fa-book"></i>
                <span>Nhật ký chi tiêu</span>
            </a>

            <div class="sidebar-label">Tài chính</div>
            <a th:href="@{/user/transactions}" class="sidebar-link"
                th:classappend="${activeLink == 'transactions' ? 'active' : ''}">
                <i class="fas fa-exchange-alt"></i>
                <span>Giao dịch</span>
            </a>
            <a th:href="@{/user/wallets}" class="sidebar-link"
                th:classappend="${activeLink == 'wallets' ? 'active' : ''}">
                <i class="fas fa-wallet"></i>
                <span>Ví của tôi</span>
            </a>
            <a th:href="@{/user/savings}" class="sidebar-link"
                th:classappend="${activeLink == 'savings' ? 'active' : ''}">
                <i class="fas fa-piggy-bank"></i>
                <span>Tiết kiệm</span>
            </a>

            <div class="sidebar-label">Cấu hình</div>
            <a th:href="@{/user/categories}" class="sidebar-link"
                th:classappend="${activeLink == 'categories' ? 'active' : ''}">
                <i class="fas fa-tags"></i>
                <span>Danh mục</span>
            </a>

            <div class="sidebar-label">Cửa hàng</div>
            <a th:href="@{/user/shop}" class="sidebar-link" th:classappend="${activeLink == 'shop' ? 'active' : ''}">
                <i class="fas fa-store"></i>
                <span>Cửa hàng Icon</span>
            </a>
        </nav>


    </aside>

    <style>
        .user-menu-container {
            position: relative;
        }

        .user-dropdown-menu {
            display: none;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            box-shadow: 0 -10px 15px -3px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.3s ease;
        }

        .user-dropdown-menu.show {
            display: block;
        }

        .btn-logout-minimal {
            width: 100%;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: #e11d48;
            padding: 0.625rem;
            border-radius: var(--radius-md);
            font-size: 0.8125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout-minimal:hover {
            background: #ffe4e6;
            transform: translateY(-2px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <script th:inline="javascript">
        function toggleUserMenu() {
            const dropdown = document.getElementById('userDropdown');
            const icon = document.getElementById('userMenuIcon');
            dropdown.classList.toggle('show');

            if (dropdown.classList.contains('show')) {
                icon.style.transform = 'rotate(180deg)';
            } else {
                icon.style.transform = 'rotate(0deg)';
            }
        }

        // Đóng menu khi nhấn ra ngoài
        document.addEventListener('click', function (event) {
            const container = document.querySelector('.user-menu-container');
            const dropdown = document.getElementById('userDropdown');
            const icon = document.getElementById('userMenuIcon');

            if (container && !container.contains(event.target)) {
                dropdown.classList.remove('show');
                icon.style.transform = 'rotate(0deg)';
            }
        });
    </script>

    <!-- Transaction Modal Fragment -->
    <div th:replace="~{fragments/transaction-modal :: transaction-modal}"></div>

    <!-- Welcome Tour Fragment -->
    <div th:replace="~{fragments/welcome-tour :: welcome-tour}"></div>

    <!-- Global Toast Container -->
    <div class="toast-container" id="toastContainer">
        <div th:if="${message}" class="toast toast-success">
            <i class="fas fa-check-circle" style="color: var(--success);"></i>
            <span th:text="${message}"></span>
        </div>
        <div th:if="${error}" class="toast toast-error">
            <i class="fas fa-exclamation-circle" style="color: var(--danger);"></i>
            <span th:text="${error}"></span>
        </div>
    </div>

    <script th:inline="javascript">
        window.effectiveDate = [[${user != null && user.testDate != null ? user.testDate : T(java.time.LocalDate).now()}]];
        
        // Inject CSRF meta tags dynamically into the head
        (function () {
            const token = [[${_csrf != null ? _csrf.token : ''}]];
            const header = [[${_csrf != null ? _csrf.headerName : ''}]];
            if (token && header) {
                let metaToken = document.querySelector('meta[name="_csrf"]');
                if (!metaToken) {
                    metaToken = document.createElement('meta');
                    metaToken.name = '_csrf';
                    document.head.appendChild(metaToken);
                }
                metaToken.content = token;

                let metaHeader = document.querySelector('meta[name="_csrf_header"]');
                if (!metaHeader) {
                    metaHeader = document.createElement('meta');
                    metaHeader.name = '_csrf_header';
                    document.head.appendChild(metaHeader);
                }
                metaHeader.content = header;
            }
        })();

        // Toast Auto-hide logic
        (function () {
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(toast => {
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    toast.style.transition = 'all 0.5s ease';
                    setTimeout(() => toast.remove(), 500);
                }, 4000);
            });
        })();
    </script>
    <script th:src="@{/js/common.js}"></script>
</div>
