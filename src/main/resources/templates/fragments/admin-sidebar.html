<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <aside th:fragment="admin-sidebar(activeLink)" class="admin-sidebar" style="width: 260px; background: #0f172a; height: 100vh; position: fixed; left: 0; top: 0; color: white; padding: 2rem 1.5rem;">
        <div style="font-size: 1.5rem; font-weight: 800; margin-bottom: 3rem; display: flex; align-items: center; gap: 0.75rem;">
            <div style="width: 35px; height: 35px; background: #3b82f6; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-shield-alt" style="font-size: 1.2rem;"></i>
            </div>
            <span>ADMIN PRO</span>
        </div>

        <nav>
            <a href="/admin/dashboard" class="sidebar-link" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
            <a href="/admin/users" class="sidebar-link" th:classappend="${activeLink == 'users' ? 'active' : ''}">
                <i class="fas fa-users"></i> Quản lý User
            </a>
            <a href="/admin/icons" class="sidebar-link" th:classappend="${activeLink == 'icons' ? 'active' : ''}">
                <i class="fas fa-icons"></i> Cửa hàng Icon
            </a>
            <a href="/admin/reports" class="sidebar-link" th:classappend="${activeLink == 'reports' ? 'active' : ''}">
                <i class="fas fa-chart-pie"></i> Báo cáo hệ thống
            </a>
            
            <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
                <a href="/user/dashboard" class="sidebar-link">
                    <i class="fas fa-user-circle"></i> Chế độ User
                </a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="sidebar-link" style="background: none; border: none; width: 100%; cursor: pointer; text-align: left;">
                        <i class="fas fa-sign-out-alt"></i> Đăng xuất
                    </button>
                </form>
            </div>
        </nav>
    </aside>
</body>
</html>
