<div th:fragment="transaction-modal" id="finalQuickModal" class="modal-overlay">
    <div style="background: #f8fafc; padding:0; border-radius:24px; width:100%; max-width:420px; position:relative; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); overflow:hidden; border: 1px solid rgba(255, 255, 255, 0.8);">
        <!-- Modal Header -->
        <div style="padding: 1.25rem 1.5rem; background: #ffffff; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;">
            <h2 id="modalTitle" style="margin: 0; font-size: 1.1rem; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-plus-circle" style="color: var(--primary);"></i>
                Giao dịch mới
            </h2>
            <button onclick="hideQuickModal()" style="background:#f1f5f9; border:none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor:pointer; color:#64748b; transition: all 0.2s;">
                <i class="fas fa-times" style="font-size: 0.9rem;"></i>
            </button>
        </div>

        <div style="padding: 1.5rem;">
            <!-- Type Tabs - More Compact and Distinct -->
            <div id="modalTabs" style="display: flex; gap: 0.35rem; margin-bottom: 1.5rem; background: #f1f5f9; padding: 0.35rem; border-radius: 14px;">
                <button type="button" class="tab-btn active" data-type="EXPENSE" onclick="setQuickType('EXPENSE')" style="flex: 1; padding: 0.6rem; border-radius: 10px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s;">Chi tiêu</button>
                <button type="button" class="tab-btn" data-type="TRANSFER" onclick="setQuickType('TRANSFER')" style="flex: 1; padding: 0.6rem; border-radius: 10px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s;">Chuyển tiền</button>
            </div>

            <form th:action="@{/user/transactions/create}" method="post" id="quickForm">
                <input type="hidden" id="quickId" name="id">
                <input type="hidden" id="quickType" name="type" value="EXPENSE">
                
                <!-- Amount Field - High Visibility -->
                <div style="margin-bottom: 1.25rem;">
                    <label style="display:block; font-weight:600; margin-bottom:0.5rem; font-size:0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em;">Số tiền giao dịch</label>
                    <div style="position: relative;">
                        <input type="number" id="quickAmount" name="amount" required placeholder="0" 
                               style="width: 100%; border: 1.5px solid #cbd5e1; background: #ffffff; font-size: 1.5rem; font-weight: 700; border-radius: 14px; padding: 0.75rem 3rem 0.75rem 1rem; color: #0f172a; outline: none; transition: border-color 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);">
                        <span style="position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; font-weight: 700; color: #94a3b8;">đ</span>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem;">
                    <!-- Category Field -->
                    <div id="quickCatGroup">
                        <label style="display:block; font-weight:600; margin-bottom:0.4rem; font-size:0.8rem; color: #334155;">Danh mục</label>
                        <input type="text" id="quickCategory" name="categoryName" list="quickCategoryOptions" class="form-control" placeholder="Chọn hoặc gõ mới..." style="border-radius: 12px; height: 42px; font-size: 0.9rem; background: #ffffff; border: 1.5px solid #cbd5e1; width: 100%; box-sizing: border-box; padding: 0 0.8rem;">
                        <datalist id="quickCategoryOptions">
                            <option th:each="c : ${categories}" th:value="${c.name}" th:attr="data-type=${c.type != null ? c.type.name() : ''}"></option>
                        </datalist>
                    </div>

                    <!-- Date Field -->
                    <div id="quickDateGroup">
                        <label style="display:block; font-weight:600; margin-bottom:0.4rem; font-size:0.8rem; color: #334155;">Ngày</label>
                        <input type="date" id="quickDate" name="date" 
                               th:min="${minDate}" th:max="${maxDate}"
                               th:value="${currentDate}" 
                               class="form-control" style="border-radius: 12px; height: 42px; font-size: 0.9rem; background: #ffffff; border: 1.5px solid #cbd5e1; padding: 0 0.5rem;">
                    </div>
                </div>

                <div id="walletGroups" style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem;">
                    <div id="quickWalletGroup">
                        <label id="quickWalletLabel" style="display:block; font-weight:600; margin-bottom:0.4rem; font-size:0.8rem; color: #334155;">Tài khoản nguồn</label>
                        <select id="quickWallet" name="wallet.id" class="form-control" style="border-radius: 12px; height: 42px; font-size: 0.9rem; background: #ffffff; border: 1.5px solid #cbd5e1;">
                            <option th:each="w : ${wallets}" 
                                    th:value="${w.id}" 
                                    th:text="${w.name}"
                                    th:attr="data-balance=${w.balance}"></option>
                        </select>
                        <!-- Cảnh báo số dư -->
                        <div id="quickBalanceWarning" style="color: var(--danger); font-size: 0.7rem; margin-top: 0.25rem; display: none;"></div>
                    </div>
                    <div id="quickToWalletGroup" style="display: none;">
                        <label style="display:block; font-weight:600; margin-bottom:0.4rem; font-size:0.8rem; color: #334155;">Đến ví</label>
                        <select id="quickToWallet" name="toWallet.id" class="form-control" style="border-radius: 12px; height: 42px; font-size: 0.9rem; background: #ffffff; border: 1.5px solid #cbd5e1;">
                            <option th:each="w : ${wallets}" th:value="${w.id}" th:text="${w.name}"></option>
                        </select>
                    </div>
                </div>

                <div style="margin-bottom: 1.5rem;">
                    <label style="display:block; font-weight:600; margin-bottom:0.4rem; font-size:0.8rem; color: #334155;">Ghi chú giao dịch</label>
                    <textarea id="quickDesc" name="description" class="form-control" rows="2" placeholder="Ví dụ: Ăn trưa văn phòng..." style="border-radius: 12px; padding: 0.6rem 0.8rem; resize: none; font-size: 0.9rem; background: #ffffff; border: 1.5px solid #cbd5e1;"></textarea>
                </div>

                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" onclick="hideQuickModal()" class="btn" style="flex: 1; background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 14px; font-weight: 600; height: 48px; font-size: 0.9rem;">Hủy</button>
                    <button type="submit" id="submitBtn" class="btn btn-primary" style="flex: 2; border-radius: 14px; font-weight: 700; height: 48px; font-size: 0.9rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">Xác nhận</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const CREATE_URL = /*[[@{/user/transactions/create}]]*/ '/user/transactions/create';
        const EDIT_URL = /*[[@{/user/transactions/edit}]]*/ '/user/transactions/edit';
        const API_GET_URL = '/user/api/transactions/';

        // AJAX Submission Logic
        document.getElementById('quickForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const originalBtnText = submitBtn.innerHTML;
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';

            try {
                const formData = new FormData(form);
                
                // Nếu ví bị disabled, FormData sẽ không lấy được value, cần lấy từ hidden input hoặc lấy tay
                const walletSelect = document.getElementById('quickWallet');
                if (walletSelect.disabled) {
                    const hiddenWallet = document.getElementById('hiddenWalletId');
                    if (hiddenWallet) formData.set('wallet.id', hiddenWallet.value);
                }

                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                if (response.ok) {
                    // Thành công: Reload trang để cập nhật số dư
                    window.location.reload();
                } else {
                    // Thất bại: Hiển thị lỗi ngay trong Modal
                    const errorText = await response.text();
                    // Nếu Server trả về nguyên trang HTML (create.html), ta cần trích xuất lỗi hoặc thông báo chung
                    const warningEl = document.getElementById('quickBalanceWarning');
                    if (warningEl) {
                        warningEl.innerText = "⚠️ Lỗi: Không thể lưu giao dịch. Vui lòng kiểm tra lại thông tin.";
                        warningEl.style.display = 'block';
                    }
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            } catch (error) {
                console.error('Error:', error);
                alert("Đã có lỗi xảy ra trong quá trình gửi dữ liệu.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });

        function showQuickModal() {
            openModal('finalQuickModal');
            // Mở khóa ví nếu trước đó bị khóa
            const walletSelect = document.getElementById('quickWallet');
            if (walletSelect) walletSelect.disabled = false;
            const hiddenWallet = document.getElementById('hiddenWalletId');
            if (hiddenWallet) hiddenWallet.remove();
            
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle" style="color: var(--primary);"></i> Giao dịch mới';
            document.getElementById('quickForm').action = CREATE_URL;
            document.getElementById('quickId').value = '';
            document.getElementById('quickForm').reset();
            document.getElementById('modalTabs').style.display = 'flex';
            setQuickType('EXPENSE');
        }

        function showQuickModalFromWallet(walletId) {
            showQuickModal();
            const walletSelect = document.getElementById('quickWallet');
            if (walletSelect) {
                walletSelect.value = walletId;
                walletSelect.disabled = true; // KHÓA VÍ
                
                // Thêm một input ẩn để vẫn gửi được walletId lên server vì field disabled sẽ không được submit
                let hiddenWallet = document.getElementById('hiddenWalletId');
                if (!hiddenWallet) {
                    hiddenWallet = document.createElement('input');
                    hiddenWallet.type = 'hidden';
                    hiddenWallet.id = 'hiddenWalletId';
                    hiddenWallet.name = 'wallet.id';
                    document.getElementById('quickForm').appendChild(hiddenWallet);
                }
                hiddenWallet.value = walletId;
            }
        }

        async function editQuickTransaction(id) {
            const modal = document.getElementById('finalQuickModal');
            if (!modal) return;

            try {
                const response = await fetch(API_GET_URL + id);
                if (!response.ok) throw new Error('Không thể tải dữ liệu');
                const data = await response.json();

                openModal('finalQuickModal');
                document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit" style="color: #3b82f6;"></i> Sửa giao dịch';
                document.getElementById('quickForm').action = EDIT_URL;
                document.getElementById('quickId').value = data.id;
                document.getElementById('quickAmount').value = data.amount;
                document.getElementById('quickDate').value = data.date;
                document.getElementById('quickDesc').value = data.description || '';
                
                setQuickType(data.type);
                
                if (data.categoryName) document.getElementById('quickCategory').value = data.categoryName;
                if (data.walletId) document.getElementById('quickWallet').value = data.walletId;
                if (data.toWalletId) document.getElementById('quickToWallet').value = data.toWalletId;

            } catch (err) {
                alert('Lỗi: ' + err.message);
            }
        }

        function hideQuickModal() {
            closeModal('finalQuickModal');
        }

        function setQuickType(type) {
            document.getElementById('quickType').value = type;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-type') === type;
                btn.style.background = isActive ? 'var(--primary)' : 'transparent';
                btn.style.color = isActive ? '#ffffff' : '#64748b';
                btn.style.boxShadow = isActive ? '0 4px 6px -1px rgba(0, 0, 0, 0.1)' : 'none';
            });

            const catGroup = document.getElementById('quickCatGroup');
            const toWalletGroup = document.getElementById('quickToWalletGroup');
            const walletLabel = document.getElementById('quickWalletLabel');
            const walletGroups = document.getElementById('walletGroups');
            const quickCategoryOptions = document.getElementById('quickCategoryOptions');
            const quickWallet = document.getElementById('quickWallet');
            const quickToWallet = document.getElementById('quickToWallet');

            // Lưu trữ master options cho Category nếu chưa có
            if (!window.masterQuickOptions) {
                window.masterQuickOptions = Array.from(quickCategoryOptions.options).map(opt => ({
                    value: opt.value,
                    type: opt.getAttribute('data-type')
                }));
            }
            
            // Lưu trữ master options cho Wallet nếu chưa có
            if (!window.masterQuickWallets) {
                window.masterQuickWallets = Array.from(quickToWallet.options).map(opt => ({
                    value: opt.value,
                    text: opt.text
                }));
            }

            if (type === 'TRANSFER') {
                if (catGroup) catGroup.style.display = 'none';
                if (toWalletGroup) toWalletGroup.style.display = 'block';
                if (walletLabel) walletLabel.innerText = 'Từ ví';
                if (walletGroups) walletGroups.style.gridTemplateColumns = '1fr 1fr';
                
                // Lọc Ví nhận
                filterQuickToWallets();
            } else {
                if (catGroup) catGroup.style.display = 'block';
                if (toWalletGroup) toWalletGroup.style.display = 'none';
                if (walletLabel) walletLabel.innerText = 'Tài khoản nguồn';
                if (walletGroups) walletGroups.style.gridTemplateColumns = '1fr';

                // Lọc datalist
                quickCategoryOptions.innerHTML = '';
                window.masterQuickOptions.forEach(opt => {
                    if (!opt.type || opt.type === type) {
                        const newOpt = document.createElement('option');
                        newOpt.value = opt.value;
                        newOpt.setAttribute('data-type', opt.type);
                        quickCategoryOptions.appendChild(newOpt);
                    }
                });
            }
            
            // Trigger balance check when type changes
            checkQuickBalance();
        }

        function filterQuickToWallets() {
            const type = document.getElementById('quickType').value;
            const quickToWallet = document.getElementById('quickToWallet');
            const quickWallet = document.getElementById('quickWallet');
            
            if (type !== 'TRANSFER' || !quickToWallet || !window.masterQuickWallets) return;
            
            const sourceId = quickWallet.value;
            const currentToValue = quickToWallet.value;
            
            quickToWallet.innerHTML = '';
            window.masterQuickWallets.forEach(w => {
                if (w.value === "" || w.value !== sourceId) {
                    const opt = document.createElement('option');
                    opt.value = w.value;
                    opt.text = w.text;
                    quickToWallet.appendChild(opt);
                }
            });
            
            // Giữ lại giá trị cũ nếu vẫn hợp lệ
            const exists = Array.from(quickToWallet.options).some(o => o.value === currentToValue);
            quickToWallet.value = exists ? currentToValue : '';
        }

        // Lắng nghe sự kiện thay đổi ví nguồn trong Modal
        document.getElementById('quickWallet').addEventListener('change', () => {
            filterQuickToWallets();
            checkQuickBalance();
        });
        
        document.getElementById('quickAmount').addEventListener('input', checkQuickBalance);

        function checkQuickBalance() {
            const amountInput = document.getElementById('quickAmount');
            const walletSelect = document.getElementById('quickWallet');
            const type = document.getElementById('quickType').value;
            const warningEl = document.getElementById('quickBalanceWarning');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!amountInput || !walletSelect || !warningEl) return;
            
            const amount = parseFloat(amountInput.value) || 0;
            const selectedOption = walletSelect.options[walletSelect.selectedIndex];
            
            if (!selectedOption || !selectedOption.value || type === 'INCOME') {
                warningEl.style.display = 'none';
                amountInput.style.borderColor = '#cbd5e1';
                if (submitBtn) submitBtn.disabled = false;
                return;
            }

            const balance = parseFloat(selectedOption.getAttribute('data-balance')) || 0;

            if (amount > balance) {
                warningEl.innerText = `⚠️ Không đủ số dư (Hiện có: ${new Intl.NumberFormat('vi-VN').format(balance)}đ)`;
                warningEl.style.display = 'block';
                amountInput.style.borderColor = 'var(--danger)';
                // Optional: Vô hiệu hóa nút submit để ép người dùng sửa lại
                // if (submitBtn) submitBtn.disabled = true;
            } else {
                warningEl.style.display = 'none';
                amountInput.style.borderColor = '#cbd5e1';
                if (submitBtn) submitBtn.disabled = false;
            }
        }
    </script>
</div>
