<!-- fragments/wallet-modal.html -->
<div th:fragment="wallet-modal" id="addWalletModal" class="modal-overlay">
    <div class="modal-content" style="max-width: 500px; border-radius: 20px; overflow: hidden;">
        <div style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); padding: 1.5rem; color: white; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; font-size: 1.25rem; font-weight: 700;">Tạo ví mới</h2>
            <button onclick="closeModal('addWalletModal')" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>
        <div style="padding: 2rem;">
            <form th:action="@{/user/wallets/create}" method="post" th:object="${newWallet}">
                <div class="form-group">
                    <label style="font-weight: 600; color: #475569;">Tên ví</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="VD: Ví Tiền Mặt, Thẻ ATM..." required 
                           style="height: 45px; border-radius: 10px;">
                </div>
                <div class="form-group">
                    <label style="font-weight: 600; color: #475569;">Số dư ban đầu</label>
                    <div style="position: relative;">
                        <input type="number" th:field="*{balance}" class="form-control" required 
                               style="height: 45px; border-radius: 10px; padding-right: 3rem; font-weight: 600;">
                        <span style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8;">VNĐ</span>
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label style="font-weight: 600; color: #475569;">Màu sắc</label>
                        <input type="color" th:field="*{colorCode}" class="form-control" style="height: 45px; padding: 5px; border-radius: 10px;" value="#3b82f6">
                    </div>
                    <div class="form-group">
                        <label style="font-weight: 600; color: #475569;">Icon</label>
                        <select th:field="*{icon}" class="form-control" style="height: 45px; border-radius: 10px;">
                            <option value="fas fa-wallet">Ví tiền</option>
                            <option value="fas fa-credit-card">Thẻ ngân hàng</option>
                            <option value="fas fa-money-bill-wave">Tiền mặt</option>
                            <option value="fas fa-piggy-bank">Tiết kiệm</option>
                            <option value="fas fa-vault">Két sắt</option>
                        </select>
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('addWalletModal')" style="flex: 1; height: 48px; border-radius: 12px;">Hủy</button>
                    <button type="submit" class="btn btn-primary" style="flex: 2; height: 48px; border-radius: 12px; background: #10b981; border: none; font-weight: 700;">Lưu ví</button>
                </div>
            </form>
        </div>
    </div>
</div>
