<!-- fragments/monthly-setup-modal.html -->
<div th:fragment="monthly-setup-modal" id="monthlySetupModal" class="modal-overlay" style="z-index: 1000;">
    <div class="modal-content" style="max-width: 600px; padding: 0; overflow: hidden; border-radius: 20px;">
        <div style="background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); padding: 2rem; color: white;">
            <h2 style="margin: 0; font-size: 1.5rem; font-weight: 700;">Thiết lập tài chính tháng <span th:text="${monthName}"></span></h2>
            <p style="margin: 0.5rem 0 0; opacity: 0.8; font-size: 0.9rem;">Cập nhật số tiền hiện có hoặc thu nhập mới cho các ví của bạn.</p>
        </div>
        
        <form th:action="@{/user/wallets/batch-fund}" method="post" style="padding: 2rem;">
            <div style="max-height: 400px; overflow-y: auto; margin-bottom: 1.5rem; padding-right: 0.5rem;">
                <div th:each="wallet : ${wallets}" class="card" style="margin-bottom: 1rem; padding: 1rem; border: 1.5px solid #f1f5f9; background: #f8fafc;">
                    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                        <div style="width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white;"
                             th:styleappend="'background: ' + ${wallet.colorCode ?: '#6366f1'}">
                            <i th:class="${wallet.icon ?: 'fas fa-wallet'}"></i>
                        </div>
                        <div style="flex: 1;">
                            <h4 th:text="${wallet.name}" style="margin: 0; font-weight: 600; color: #1e293b;">Tên ví</h4>
                            <span style="font-size: 0.75rem; color: #64748b;">Số dư hiện tại: <strong th:text="${#numbers.formatDecimal(wallet.balance, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</strong></span>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin: 0;">
                        <label style="font-size: 0.75rem; font-weight: 600; color: #475569; margin-bottom: 0.25rem; display: block;">SỐ TIỀN THÊM VÀO (THU NHẬP/VỐN)</label>
                        <div style="position: relative;">
                            <input type="number" th:name="'amounts[' + ${wallet.id} + ']'" class="form-control" placeholder="0" 
                                   style="height: 45px; border-radius: 10px; padding-right: 3rem; font-weight: 600;">
                            <span style="position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 0.8rem;">VNĐ</span>
                        </div>
                        <input type="hidden" th:name="'descriptions[' + ${wallet.id} + ']'" th:value="'Cấp vốn đầu tháng ' + ${monthName}">
                    </div>
                </div>
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <button type="button" onclick="closeMonthlySetup()" class="btn btn-secondary" style="flex: 1; height: 48px; border-radius: 12px;">Bỏ qua</button>
                <button type="submit" class="btn btn-primary" style="flex: 2; height: 48px; border-radius: 12px; background: #6366f1; border: none; font-weight: 600;">
                    Xác nhận & Bắt đầu
                </button>
            </div>
        </form>
    </div>
</div>
