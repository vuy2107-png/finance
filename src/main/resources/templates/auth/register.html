<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Finance Pro</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-split-layout">
        <!-- Left Side - Visual & Testimonial -->
        <div class="auth-split-visual">
            <div class="brand">
                <i class="fas fa-chart-pie"></i> Finance Pro
            </div>
            
            <div class="testimonial">
                <p class="quote">"Tham gia Finance Pro là quyết định tài chính đúng đắn nhất của tôi. Giao diện trực quan và dễ sử dụng!"</p>
                <div class="author">
                    <div class="author-avatar" style="background-image: url('https://ui-avatars.com/api/?name=Designer&background=3b82f6&color=fff'); background-size: cover;"></div>
                    <div>
                        <div style="color: white; font-weight: 500;">Trần Thị B</div>
                        <div style="font-size: 0.875rem;">Trưởng nhóm Thiết kế</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side - Form -->
        <div class="auth-split-form-container">
            <div class="auth-form-wrapper">
                <div class="auth-form-header">
                    <h1>Tạo tài khoản</h1>
                    <p>Bắt đầu hành trình quản lý tài chính của bạn hoàn toàn miễn phí.</p>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập <span style="color: red">*</span></label>
                        <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Tên đăng nhập" required>
                        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email <span style="color: red">*</span></label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="example@gmail.com" required>
                        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">Mật khẩu <span style="color: red">*</span></label>
                        <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Ít nhất 6 ký tự" required>
                        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu <span style="color: red">*</span></label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" placeholder="Nhập lại mật khẩu" required>
                        <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" style="color: var(--danger); font-size: 0.75rem; margin-top: 0.25rem;"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="padding: 0.75rem; font-size: 1rem; margin-top: 1rem;">Đăng ký tài khoản</button>
                </form>

                <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
                    Đã có tài khoản? <a href="/login" style="font-weight: 600;">Đăng nhập ngay</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
