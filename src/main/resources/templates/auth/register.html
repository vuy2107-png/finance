<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        h2 {
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
        }
        .error {
            color: red;
            font-size: 13px;
        }
        a {
            display: block;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Đăng ký</h2>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <!-- Username -->
        <input type="text" th:field="*{username}" placeholder="Username"/>
        <div class="error" th:if="${#fields.hasErrors('username')}"
             th:errors="*{username}"></div>

        <!-- Password -->
        <input type="password" th:field="*{password}" placeholder="Password"/>
        <div class="error" th:if="${#fields.hasErrors('password')}"
             th:errors="*{password}"></div>

        <button type="submit">Đăng ký</button>
    </form>

    <a th:href="@{/login}">Đã có tài khoản? Đăng nhập</a>
</div>

</body>
</html>
